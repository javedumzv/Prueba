<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Fundación Ayuda Mutua A. C.</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>
    <div class="login-container">
        <div class="empresa">
            <!-- Logotipo SVG -->
            <div class="logo-fam">
                <svg width="60" height="60" viewBox="0 0 60 60" fill="none">
                    <circle cx="30" cy="30" r="28" fill="#f8bbd0" stroke="#e75480" stroke-width="3"/>
                    <path d="M30 40 Q22 32 30 24 Q38 32 30 40Z" fill="#e75480"/>
                    <circle cx="30" cy="24" r="5" fill="#fff"/>
                    <circle cx="30" cy="24" r="3" fill="#e75480"/>
                </svg>
            </div>
            <h2>Fundación Ayuda Mutua A. C.</h2>
            <span>Versión 1.0.0</span>
        </div>
        <form>
            <label for="usuario">Usuario:</label>
            <input type="text" id="usuario" name="usuario" required>
            <label for="contrasena">Contraseña:</label>
            <input type="password" id="contrasena" name="contrasena" required>
            <input type="submit" value="Ingresar">
        </form>
    </div>
</body>
</html>
